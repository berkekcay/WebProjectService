services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gym_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=WebProjectServiceDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: WebProjectService
      Jwt__Audience: WebProjectServiceClients
      Jwt__ExpiresInMinutes: 120
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  mssql_data: